<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宇德室內裝修 - 快速報價系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh}
.screen-ui{display:block}

/* Layout */
.layout{display:flex;min-height:100vh}
.resizer{width:5px;background:#e0ddd5;cursor:col-resize;flex-shrink:0;transition:background 0.15s;position:relative;z-index:10}
.resizer:hover,.resizer.dragging{background:#c0392b}
.panel-left{background:#fff;display:flex;flex-direction:column;height:100vh;position:sticky;top:0;width:380px;flex-shrink:0;min-width:200px;max-width:600px}
.panel-right{flex:1;min-width:0}
.panel-right{padding:24px;overflow-y:auto;flex:1;min-width:0}

/* Left panel */
.logo{padding:16px 20px 12px;border-bottom:1px solid #e0ddd5;display:flex;justify-content:space-between;align-items:center}
.logo h1{font-size:15px;font-weight:600;color:#1a1a1a}
.logo p{font-size:11px;color:#888;margin-top:2px}
.mode-toggle{display:flex;gap:4px}
.mode-btn{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid #e0ddd5;background:#fff;cursor:pointer;color:#666;transition:all 0.15s;white-space:nowrap}
.mode-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.search-area{padding:10px 16px;border-bottom:1px solid #e0ddd5}
.search-area input{width:100%;padding:7px 12px;border:1px solid #e0ddd5;border-radius:8px;font-size:13px;outline:none;background:#f9f8f6}
.search-area input:focus{border-color:#bbb;background:#fff}
.cat-tabs{display:flex;flex-wrap:wrap;gap:4px;padding:8px 16px;border-bottom:1px solid #e0ddd5}
.cat-tab{font-size:11px;padding:3px 8px;border-radius:20px;border:1px solid #e0ddd5;background:#fff;cursor:pointer;color:#666;transition:all 0.15s}
.cat-tab.active,.cat-tab:hover{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.item-list{flex:1;overflow-y:auto;padding:6px 0}

/* Quote mode items */
.item-row{display:flex;align-items:center;padding:6px 16px;cursor:pointer;gap:8px;transition:background 0.1s}
.item-row:hover{background:#f5f4f0}
.item-info{flex:1;min-width:0}
.item-name{font-size:12px;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-sub{font-size:11px;color:#999;margin-top:1px}
.item-price{font-size:12px;font-weight:600;color:#444;text-align:right;white-space:nowrap}
.item-unit{font-size:10px;color:#999;text-align:right}
.add-btn{width:22px;height:22px;border-radius:50%;background:#1a1a1a;color:#fff;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* Edit mode items */
.edit-row{padding:8px 16px;border-bottom:0.5px solid #f0ede5;transition:background 0.1s}
.edit-row:hover{background:#faf9f7}
.edit-row-top{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.edit-name{font-size:12px;font-weight:500;color:#1a1a1a;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.edit-del-btn{width:20px;height:20px;border-radius:50%;background:none;border:1px solid #fcc;cursor:pointer;color:#c66;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.edit-del-btn:hover{background:#fee}
.edit-row-fields{display:flex;gap:6px;align-items:center}
.edit-select{flex:1;font-size:11px;padding:3px 6px;border:1px solid #e0ddd5;border-radius:5px;outline:none;background:#fff;color:#1a1a1a;min-width:0}
.edit-input{width:70px;font-size:11px;padding:3px 6px;border:1px solid #e0ddd5;border-radius:5px;outline:none;background:#fff;text-align:right;color:#1a1a1a}
.edit-unit{width:40px;font-size:11px;padding:3px 4px;border:1px solid #e0ddd5;border-radius:5px;outline:none;background:#fff;text-align:center;color:#1a1a1a}
.edit-save-row{padding:10px 16px;border-top:1px solid #e0ddd5;display:flex;gap:8px;align-items:center}
.edit-status{font-size:11px;color:#888;flex:1}
.edit-status.saved{color:#2c6e49}
.no-results{padding:24px;text-align:center;color:#aaa;font-size:13px}

/* Add new item in edit mode */
.add-new-item{padding:10px 16px;border-bottom:1px solid #e0ddd5;background:#f9f8f6}
.add-new-item .row{display:flex;gap:6px;margin-bottom:6px}
.add-new-item input,.add-new-item select{font-size:12px;padding:5px 8px;border:1px solid #e0ddd5;border-radius:6px;outline:none;background:#fff}
.add-new-item .btn-add{font-size:12px;padding:5px 12px;border-radius:6px;border:none;background:#1a1a1a;color:#fff;cursor:pointer}

/* Right panel - quote area */
.right-top{margin-bottom:20px}
.project-info h2{font-size:22px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
.meta-row{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}
.meta-field{display:flex;flex-direction:column;gap:4px}
.meta-field label{font-size:11px;color:#999;font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
.meta-field input{padding:6px 10px;border:1px solid #e0ddd5;border-radius:6px;font-size:13px;background:#fff;outline:none;min-width:140px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:10px;padding:14px 16px;border:1px solid #e0ddd5}
.stat-label{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.stat-value{font-size:20px;font-weight:600;color:#1a1a1a}
.stat-value.accent{color:#2c6e49}
.quote-table{background:#fff;border-radius:10px;border:1px solid #e0ddd5;overflow:hidden;margin-bottom:20px}
.table-header{display:grid;grid-template-columns:36px 1fr 70px 70px 110px 100px 120px 32px;padding:8px 16px;background:#f5f4f0;border-bottom:1px solid #e0ddd5;font-size:11px;color:#999;font-weight:500;gap:8px;align-items:center}
.quote-row{display:grid;grid-template-columns:36px 1fr 70px 70px 110px 100px 120px 32px;padding:7px 16px;border-bottom:0.5px solid #f0ede5;align-items:center;gap:8px}
.quote-row:hover{background:#faf9f7}
.row-num{font-size:12px;color:#ccc;cursor:grab;user-select:none;display:flex;flex-direction:column;align-items:center;gap:2px}
.row-num .drag-icon{font-size:10px;color:#ddd;line-height:1;letter-spacing:-1px}
.quote-row:hover .drag-icon{color:#aaa}
.quote-row.dragging{opacity:0.35;background:#f0ede5}
.quote-row.drag-over{border-top:2px solid #c0392b}
.quote-row.selected{background:#fff9c4;outline:2px solid #f5c518;outline-offset:-2px}
.quote-row.selected:hover{background:#fff59d;outline:2px solid #f5c518;outline-offset:-2px}
.row-name{font-size:13px;color:#1a1a1a;text-align:left}
.row-input{width:100%;text-align:right;padding:4px 6px;border:1px solid transparent;border-radius:5px;font-size:13px;background:transparent;color:#1a1a1a;outline:none}
.row-input:hover,.row-input:focus{border-color:#e0ddd5;background:#fff}
.row-amount{font-size:13px;font-weight:600;color:#1a1a1a;text-align:right}
.row-delete{width:26px;height:26px;border-radius:50%;background:none;border:none;cursor:pointer;color:#ccc;font-size:15px;display:flex;align-items:center;justify-content:center}
.row-delete:hover{background:#fee;color:#e44}
.section-header{display:grid;grid-template-columns:36px 1fr 70px 70px 110px 100px 120px 32px;padding:6px 16px;background:#f9f8f6;border-bottom:0.5px solid #e0ddd5;gap:8px;align-items:center}
.section-title{font-size:11px;font-weight:600;color:#555;grid-column:2/3}
.section-subtotal{font-size:12px;font-weight:600;color:#888}
.add-custom{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.add-custom input,.add-custom select{padding:8px 12px;border:1px solid #e0ddd5;border-radius:8px;font-size:13px;outline:none;background:#fff}
.btn{padding:8px 16px;border-radius:8px;border:1px solid #e0ddd5;background:#fff;font-size:13px;cursor:pointer;font-weight:500;transition:all 0.15s}
.btn:hover{background:#f5f4f0}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-primary:hover{background:#333}
.bottom-bar{display:flex;justify-content:space-between;align-items:center;padding:16px;background:#fff;border-radius:10px;border:1px solid #e0ddd5}
.total-block{text-align:right}
.total-block .lbl{font-size:12px;color:#999;margin-bottom:4px}
.total-block .amt{font-size:26px;font-weight:700;color:#1a1a1a}
.total-block .tax{font-size:12px;color:#999;margin-top:2px}
.actions{display:flex;gap:8px}
.empty-state{text-align:center;padding:48px 24px;color:#ccc;font-size:14px}
.tag-freq{font-size:10px;background:#f0ede5;color:#888;padding:1px 5px;border-radius:10px}
.price-hint{font-size:10px;color:#bbb}

/* Edit mode right panel message */
.edit-mode-msg{background:#fff;border-radius:10px;border:1px solid #e0ddd5;padding:32px;text-align:center;color:#888;font-size:14px;margin-bottom:20px}
.edit-mode-msg strong{display:block;font-size:16px;color:#1a1a1a;margin-bottom:8px}

/* Print */

.print-doc{display:none}

/* CSS Logo */
.css-logo{display:inline-flex;align-items:center;justify-content:center;width:36pt;height:36pt;flex-shrink:0}
.hex-wrap{position:relative;width:32pt;height:32pt}
.hex{width:22pt;height:22pt;background:none;border:2pt solid #222;transform:rotate(30deg);margin:5pt auto;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%)}
/* Print table header repeat */
@media print{
  .pd-detail-table{width:100%}
  .pd-detail-table thead{display:table-header-group}
  .pd-repeat-header td,.pd-col-header th{border:none}
}
.pd-cat-title-cell{font-size:10.5pt;font-weight:700;padding:6pt 0 2pt;border:none;border-bottom:0.5pt solid #888}
.pd-col-header th{background:#ebebeb;border:0.5pt solid #888;padding:4pt 5pt;text-align:center;font-weight:600;font-size:8.5pt;white-space:nowrap}
@media print{
  .screen-ui{display:none!important}
  .print-doc{display:block!important}
  @page{size:A4;margin:12mm 12mm 15mm 12mm}
}
.pd{font-family:"Noto Sans TC",sans-serif;font-size:10pt;color:#000;width:100%;box-sizing:border-box;padding-right:1pt}
.pd-header{display:table;width:100%;margin-bottom:6pt;padding-bottom:6pt;border-bottom:1.5pt solid #000}
.pd-header-left{display:table-cell;vertical-align:top}
.pd-header-logo-row{display:flex;align-items:center;gap:6pt;margin-bottom:3pt}
.pd-header-co-info{font-size:8pt;color:#333;line-height:1.6}
.pd-header-right{display:table-cell;vertical-align:top;text-align:right;font-size:9pt;white-space:nowrap;width:80pt}
.pd-title{font-size:16pt;font-weight:700;text-align:center;letter-spacing:6pt;color:#c0392b;margin:6pt 0 5pt}
.pd-title-sub{font-size:13pt;font-weight:700;text-align:center;letter-spacing:3pt;color:#c0392b;margin:4pt 0 5pt}
.pd-meta{font-size:9.5pt;line-height:1.8;border-bottom:0.5pt solid #ccc;padding-bottom:4pt;margin-bottom:6pt}
.pd table{width:100%;border-collapse:collapse;font-size:9pt;margin-bottom:6pt}
.pd th{background:#ebebeb;border:0.5pt solid #888;padding:4pt 5pt;text-align:center;font-weight:600;font-size:8.5pt;white-space:nowrap}
.pd td{border:0.5pt solid #aaa;padding:3.5pt 5pt;vertical-align:middle}
.pd .tc{text-align:center}
.pd .tr{text-align:right}
.pd .subtotal-row td{background:#f5f5f5;font-weight:600;border-top:0.5pt solid #777}
.pd .total-row td{font-weight:700;border-top:1.5pt solid #000;font-size:10pt}
.pd .tax-row td{color:#444}
.pd .grand-row td{font-weight:700;font-size:12pt;border-top:1.5pt solid #000;border-bottom:1.5pt solid #000}
.pd-cat-title{font-size:10.5pt;font-weight:700;margin:8pt 0 3pt;padding:2pt 0;border-bottom:0.5pt solid #888}
.pd-remarks{margin-top:8pt;font-size:8pt;color:#444;line-height:1.9;border-top:0.5pt solid #aaa;padding-top:5pt}
.pd-page-break{page-break-before:always}
.pd-page-header{display:table-header-group!important}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
(function(){
  try{
    var s=localStorage.getItem('yutesign_session');
    if(!s)return;
    var d=JSON.parse(s);
    if(!d.email||!d.email.endsWith('@yutesign.com'))return;
    if(Date.now()-d.loginTime>8*3600*1000)return;
    document.addEventListener('DOMContentLoaded',function(){
      var ls=document.getElementById('loginScreen');
      var ma=document.getElementById('mainApp');
      if(ls)ls.style.display='none';
      if(ma)ma.style.display='';
    });
  }catch(e){}
})();
</script>
</head>
<body>

<!-- 登入驗證畫面 -->
<div id="loginScreen" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f5f4f0">
  <div style="background:#fff;border-radius:16px;padding:48px 40px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.08);max-width:400px;width:90%">
    <div style="font-size:32px;margin-bottom:12px">🏠</div>
    <h1 style="font-size:20px;font-weight:700;color:#1a1a1a;margin-bottom:6px">宇德室內裝修</h1>
    <p style="font-size:14px;color:#888;margin-bottom:32px">報價系統</p>
    <button id="btnLogin" onclick="startLogin()" style="background:#4285f4;color:#fff;border:none;border-radius:8px;padding:14px 32px;font-size:15px;font-weight:600;cursor:pointer;width:100%">使用公司帳號登入</button>
    <p id="loginError" style="margin-top:16px;font-size:13px;color:#e53935;display:none"></p>
    <p style="margin-top:24px;font-size:12px;color:#bbb">僅限 @yutesign.com 帳號使用</p>
  </div>
</div>

<!-- 主系統畫面 -->
<div id="mainApp" style="display:none">
<div class="screen-ui">
<div class="layout">

<!-- LEFT PANEL -->
<div class="panel-left">
  <div class="logo">
    <div><h1>宇德室內裝修</h1><p id="modeLabel">報價模式</p></div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="btnQuoteMode" onclick="setMode('quote')">報價</button>
      <button class="mode-btn" id="btnEditMode" onclick="setMode('edit')">編輯工項</button>
    </div>
  </div>
  <div class="search-area">
    <input type="text" id="searchInput" placeholder="搜尋工項名稱…" oninput="onSearch()">
  </div>
  <div class="cat-tabs" id="catTabs"></div>
  <div class="item-list" id="itemList"></div>
  <!-- Edit mode save bar -->
  <div id="editSaveBar" style="display:none">
    <div class="add-new-item">
      <div class="row">
        <input id="newItemName" placeholder="新增工項名稱" style="flex:1"/>
      </div>
      <div class="row">
        <input id="newItemUnit" placeholder="單位" style="width:60px"/>
        <input id="newItemPrice" placeholder="單價" type="number" style="width:90px"/>
        <select id="newItemCat" style="flex:1;font-size:12px;padding:5px 6px;border:1px solid #e0ddd5;border-radius:6px;outline:none"><option value="假設及拆運工程">假設及拆運工程</option><option value="水電／照明工程">水電／照明工程</option><option value="輕隔間及輕鋼架天花工程">輕隔間及輕鋼架天花工程</option><option value="泥作及貼磚工程">泥作及貼磚工程</option><option value="木作及系統櫃工程">木作及系統櫃工程</option><option value="門扇工程">門扇工程</option><option value="鋁窗工程">鋁窗工程</option><option value="鐵件及金屬工程">鐵件及金屬工程</option><option value="油漆工程">油漆工程</option><option value="地坪工程">地坪工程</option><option value="玻璃及貼膜工程">玻璃及貼膜工程</option><option value="招牌工程">招牌工程</option><option value="窗簾工程">窗簾工程</option><option value="空調工程">空調工程</option><option value="衛浴設備工程">衛浴設備工程</option><option value="廚具設備工程">廚具設備工程</option><option value="燈具、設備及其他工程">燈具、設備及其他工程</option><option value="施工區域完工後清潔工程">施工區域完工後清潔工程</option><option value="設計製圖費">設計製圖費</option>        </select>
        <button class="btn-add" onclick="addNewItemToDb()">新增</button>
      </div>
    </div>
    <div class="edit-save-row">
      <span class="edit-status" id="editStatus">工項資料庫 — 點選各項目可修改類別與單價</span>
      <button class="btn btn-primary" onclick="saveDb()" style="font-size:12px;padding:6px 14px">儲存變更</button>
    </div>
  </div>
</div>

<!-- RESIZER -->
<div class="resizer" id="panelResizer"></div>

<!-- RIGHT PANEL -->
<div class="panel-right">
  <!-- 同步通知橫條 -->
  <div id="syncBanner" style="display:none;background:#e65100;color:#fff;padding:9px 16px;margin:-24px -24px 16px -24px;align-items:center;gap:12px;font-size:13px;flex-wrap:wrap">
    <span style="flex:1">⚠️ 同事剛儲存了新版本，你目前的編輯尚未存檔</span>
    <button onclick="syncDismiss()" style="background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.7);padding:4px 14px;border-radius:4px;cursor:pointer;white-space:nowrap">知道了</button>
  </div>
  <div class="right-top">
    <div class="project-info">
      <h2>工程報價單</h2>
      <div class="meta-row">
        <div class="meta-field"><label>工程名稱</label><input id="projName" placeholder="輸入工程名稱" style="min-width:300px"/></div>
        <div class="meta-field"><label>業主</label><input id="projClient" placeholder="業主姓名"/></div>
        <div class="meta-field"><label>工程地址</label><input id="projAddr" placeholder="工程地址" style="min-width:220px"/></div>
        <div class="meta-field"><label>日期</label><input id="projDate" type="date"/></div>
        <div class="meta-field"><label>管理費%</label><input id="mgmtFee" type="number" value="5" min="0" max="20" style="width:80px" onchange="renderQuote()"/></div>
        <div class="meta-field"><label>負責人Email</label><input id="projEmail" placeholder="shower.li@yutesign.com" style="min-width:200px" value="shower.li@yutesign.com"/></div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;padding:8px 12px;background:#f9f8f6;border-radius:6px;border:1px solid #e0ddd5;font-size:12px">
        <span style="color:#888;align-self:center;font-weight:500">附加項目：</span>
        <div style="display:flex;align-items:center;gap:4px">
          <label style="white-space:nowrap;color:#555">完工清潔</label>
          <select id="extraCleanMode" onchange="toggleCleanMode()" style="font-size:11px;padding:2px 4px;border:1px solid #ddd;border-radius:4px">
            <option value="unit">坪×單價</option>
            <option value="fixed">1式固定</option>
          </select>
          <span id="cleanUnitWrap" style="display:flex;align-items:center;gap:4px">
            <input id="extraCleanQty" type="number" value="0" min="0" style="width:60px" onchange="updateClean()" placeholder="坪">
            <span style="color:#888">×</span>
            <input id="extraCleanPrice" type="number" value="700" min="0" style="width:70px" onchange="updateClean()" placeholder="單價">
          </span>
          <span id="cleanFixedWrap" style="display:none;align-items:center;gap:4px">
            <input id="extraCleanFixed" type="number" value="0" min="0" style="width:90px" onchange="updateClean()" placeholder="固定金額">
          </span>
        </div>
        <div style="display:flex;align-items:center;gap:4px">
          <label style="white-space:nowrap;color:#555">設計製圖費</label>
          <select id="extraDesignMode" onchange="toggleDesignMode();renderQuote()" style="font-size:11px;padding:2px 4px;border:1px solid #ddd;border-radius:4px">
            <option value="fixed">固定金額</option>
            <option value="pct">%計價</option>
            <option value="unit">坪×單價</option>
          </select>
          <span id="designFixedWrap" style="display:flex;align-items:center;gap:4px">
            <input id="extraDesignFixed" type="number" value="0" min="0" style="width:90px" onchange="renderQuote()" placeholder="金額">
          </span>
          <span id="designPctWrap" style="display:none;align-items:center;gap:4px">
            <input id="extraDesignPct" type="number" value="0" min="0" max="100" step="0.5" style="width:60px" onchange="renderQuote()" placeholder="%">

// ── Database persistence (localStorage) ──
function loadDb(){
  try{
    const saved=localStorage.getItem('yutesign_db');
    const savedVer=localStorage.getItem('yutesign_db_ver');
    if(saved && savedVer===DB_VERSION){
      dbItems=JSON.parse(saved);
    } else {
      dbItems=DEFAULT_ITEMS.map(item=>({...item,類別:mapCat(item['類別'])}));
      localStorage.setItem('yutesign_db_ver',DB_VERSION);
      localStorage.setItem('yutesign_db',JSON.stringify(dbItems));
    }
  } catch(e){
    dbItems=DEFAULT_ITEMS.map(item=>({...item,類別:mapCat(item['類別'])}));
  }
}

function saveDb(){
  try{
    localStorage.setItem('yutesign_db',JSON.stringify(dbItems));
    dbModified=false;
    const st=document.getElementById('editStatus');
    if(st){st.textContent='✓ 已儲存';st.className='edit-status saved';}
    setTimeout(()=>{
      if(st){st.textContent='工項資料庫 — 點選各項目可修改類別與單價';st.className='edit-status';}
    },2000);
    // Re-render left panel to reflect changes
    renderCatTabs();
    renderLeftPanel();
  } catch(e){
    alert('儲存失敗：'+e.message);
  }
}

function mapCat(cat){return CAT_MAP[cat]||cat;}

    if(s.projName!==undefined)document.getElementById('projName').value=s.projName;
    if(s.projClient!==undefined)document.getElementById('projClient').value=s.projClient;
    if(s.projAddr!==undefined)document.getElementById('projAddr').value=s.projAddr;
    if(s.projDate!==undefined)document.getElementById('projDate').value=s.projDate;
    if(s.mgmtFee!==undefined)document.getElementById('mgmtFee').value=s.mgmtFee;
    if(s.projEmail!==undefined&&document.getElementById('projEmail'))document.getElementById('projEmail').value=s.projEmail;
    if(s.projDuration!==undefined){projDuration=s.projDuration;const el=document.getElementById('projDuration');if(el)el.value=s.projDuration;}
    if(s.quoteItems)quoteItems=s.quoteItems.map(item=>({...item,id:item.id||(Date.now()+Math.random())}));
    if(s.catNotes)catNotes=s.catNotes;
    if(s.remarksItems)remarksItems=[...s.remarksItems];
    if(s.miscItems){miscItems=[...s.miscItems];renderMiscItems();}
    if(s.extraCleanMode&&document.getElementById('extraCleanMode')){document.getElementById('extraCleanMode').value=s.extraCleanMode;toggleCleanMode();}
    if(s.extraCleanQty!==undefined&&document.getElementById('extraCleanQty'))document.getElementById('extraCleanQty').value=s.extraCleanQty;
    if(s.extraCleanPrice!==undefined&&document.getElementById('extraCleanPrice'))document.getElementById('extraCleanPrice').value=s.extraCleanPrice;
    if(s.extraCleanFixed!==undefined&&document.getElementById('extraCleanFixed'))document.getElementById('extraCleanFixed').value=s.extraCleanFixed;
    if(s.extraDesignMode&&document.getElementById('extraDesignMode')){document.getElementById('extraDesignMode').value=s.extraDesignMode;toggleDesignMode();}
    if(s.extraDesignFixed!==undefined&&document.getElementById('extraDesignFixed'))document.getElementById('extraDesignFixed').value=s.extraDesignFixed;
    if(s.extraDesignPct!==undefined&&document.getElementById('extraDesignPct'))document.getElementById('extraDesignPct').value=s.extraDesignPct;
    if(s.extraDesignQty!==undefined&&document.getElementById('extraDesignQty'))document.getElementById('extraDesignQty').value=s.extraDesignQty;
    if(s.extraDesignPrice!==undefined&&document.getElementById('extraDesignPrice'))document.getElementById('extraDesignPrice').value=s.extraDesignPrice;
    if(s.extraInsurance!==undefined&&document.getElementById('extraInsurance'))document.getElementById('extraInsurance').value=s.extraInsurance;

function saveHistory(){undoHistory.push(JSON.stringify(quoteItems));if(undoHistory.length>20)undoHistory.shift();redoHistory=[];}
function undo(){if(!undoHistory.length)return;redoHistory.push(JSON.stringify(quoteItems));quoteItems=JSON.parse(undoHistory.pop());renderQuote();}

function addItem(item){

function removeItem(id){saveHistory();quoteItems=quoteItems.filter(i=>i.id!==id);renderQuote();}
function updateField(id,field,val){saveHistory();const item=quoteItems.find(i=>i.id===id);if(item)item[field]=parseFloat(val)||0;renderQuote();}
function updateStrField(id,field,val){saveHistory();const item=quoteItems.find(i=>i.id===id);if(item)item[field]=val;}
function buildCatOptions(sel){
  const allCats=customSectionOrder?[...new Set([...customSectionOrder,...SECTION_ORDER])]:SECTION_ORDER;
  return allCats.map(s=>`<option value="${s}"${s===sel?' selected':''}>${s.replace('工程','').replace('及系統櫃','').replace('及輕鋼架天花','').replace('及貼磚','').replace('及貼膜','').replace('、設備及其他','').replace('及鋁窗','')}</option>`).join('');
}
function updateItemCat(id,newCat){
  saveHistory();
  const item=quoteItems.find(i=>i.id===id);
  if(!item)return;
  item.cat=newCat;
  // 同步回資料庫
  const dbItem=dbItems.find(d=>d['工項名稱']===item.name);
  if(dbItem){dbItem['類別']=newCat;saveDb();}
  renderQuote();
}

function getSections(){
  const g={};
  quoteItems.forEach(item=>{if(!g[item.cat])g[item.cat]=[];g[item.cat].push(item);});
  const order=customSectionOrder||SECTION_ORDER;
  const sorted={};
  order.forEach(s=>{if(g[s])sorted[s]=g[s];});
  Object.keys(g).forEach(s=>{if(!sorted[s])sorted[s]=g[s];});
  return sorted;
}

function toggleCleanMode(){
  const mode=document.getElementById('extraCleanMode')?.value||'unit';

function toggleDesignMode(){
  const mode=document.getElementById('extraDesignMode')?.value||'fixed';
  const fw=document.getElementById('designFixedWrap');
  const pw=document.getElementById('designPctWrap');
  const uw=document.getElementById('designUnitWrap');
  if(fw) fw.style.display=mode==='fixed'?'flex':'none';
  if(pw) pw.style.display=mode==='pct'?'flex':'none';

}
function getExtraItems(){
  const cleanMode=document.getElementById('extraCleanMode')?.value||'unit';
  const cleanQty=parseFloat(document.getElementById('extraCleanQty')?.value)||0;
  const cleanPrice=parseFloat(document.getElementById('extraCleanPrice')?.value)||700;
  const cleanFixed=parseFloat(document.getElementById('extraCleanFixed')?.value)||0;
  const clean=cleanMode==='fixed'?Math.round(cleanFixed):Math.round(cleanQty*cleanPrice);
  const insurance=parseFloat(document.getElementById('extraInsurance')?.value)||0;
  const mode=document.getElementById('extraDesignMode')?.value||'fixed';
  let design=0, designQty=0, designPrice=0, designPct=0;
  // 基礎 = 工項小計 + 清潔費
  let subtotal=0; quoteItems.forEach(i=>subtotal+=i.qty*i.price);
  const mgmtBase=subtotal+clean;
  if(mode==='fixed'){
    design=parseFloat(document.getElementById('extraDesignFixed')?.value)||0;
  } else if(mode==='pct'){
    designPct=parseFloat(document.getElementById('extraDesignPct')?.value)||0;
    design=Math.round(mgmtBase*(designPct/100));
  } else {
    designQty=parseFloat(document.getElementById('extraDesignQty')?.value)||0;
    designPrice=parseFloat(document.getElementById('extraDesignPrice')?.value)||0;
    design=designQty*designPrice;
  }
  const miscTotal=miscItems.reduce((s,m)=>s+(m.qty||1)*(m.price||0),0);
  return {clean, cleanMode, cleanQty, cleanPrice, cleanFixed, designQty, designPrice, designPct, designMode:mode, design, insurance, mgmtBase, miscTotal, miscItems:[...miscItems]};
}
function getCalc(){
  const mgmtPct=parseFloat(document.getElementById('mgmtFee').value)||0;
  let subtotal=0;quoteItems.forEach(i=>subtotal+=i.qty*i.price);
  const _extraData=getExtraItems();
  const {clean,design,insurance,miscTotal}=_extraData;
  const extras=clean+design+insurance+(miscTotal||0);
  // 管理費基礎 = 工項小計 + 清潔費（同Excel）
  const _mgmtBase=_extraData.mgmtBase||(subtotal+_extraData.clean);
  const mgmt=_mgmtBase*(mgmtPct/100),beforeTax=subtotal+mgmt+extras,tax=beforeTax*0.05,total=beforeTax+tax;
  return {subtotal,mgmt,mgmtPct,extras,clean,design,insurance,beforeTax,tax,total};
}

let _dragId=null;
function qDS(e,id){_dragId=id;setTimeout(()=>e.target.closest('.quote-row').classList.add('dragging'),0);}
function qDE(){document.querySelectorAll('.quote-row').forEach(el=>el.classList.remove('dragging','drag-over'));}
function qDO(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function qDL(e){e.currentTarget.classList.remove('drag-over');}
function qDP(e,targetId){
  e.preventDefault();
  document.querySelectorAll('.quote-row').forEach(el=>el.classList.remove('drag-over'));
  if(_dragId===targetId)return;
  const si=quoteItems.findIndex(i=>i.id===_dragId);
  const ti=quoteItems.findIndex(i=>i.id===targetId);
  if(si<0||ti<0)return;
  saveHistory();
  const[moved]=quoteItems.splice(si,1);
  quoteItems.splice(ti,0,moved);
  renderQuote();
}

function renderQuote(){saveQuoteState();
  if(mode==='edit') return;
  const area=document.getElementById('rightContent');
  const {subtotal,mgmt,mgmtPct,beforeTax,tax,total}=getCalc();
  // 搜尋過濾
  const qsEl=document.getElementById('quoteSearch');
  const qsClear=document.getElementById('quoteSearchClear');
  const qKeyword=(qsEl?.value||'').trim().toLowerCase();
  if(qsClear) qsClear.style.display=qKeyword?'':'none';
  if(!quoteItems.length){
    area.innerHTML='<div class="empty-state">從左側工項資料庫選取項目，或手動新增工項</div>';
    updateStats(0,subtotal,mgmtPct);return;
  }
  const grouped=getSections();
  if(qKeyword){
    Object.keys(grouped).forEach(cat=>{
      grouped[cat]=grouped[cat].filter(i=>i.name.toLowerCase().includes(qKeyword)||(i.note||'').toLowerCase().includes(qKeyword));
      if(!grouped[cat].length) delete grouped[cat];
    });
  }
  if(qKeyword && !Object.keys(grouped).length){
    area.innerHTML=`<div class="empty-state">找不到含「${qKeyword}」的工項</div>`;
    return;
  }
  let num=1;
  let html=`<div class="quote-table">
    <div class="table-header">
      <span>#</span><span>工項名稱</span>
      <span style="text-align:right">單位</span><span style="text-align:right">數量</span>
      <span style="text-align:right">單價</span><span style="text-align:right">複價</span>
      <span style="text-align:center;font-size:11px">備註</span><span></span>
    </div>`;
  Object.entries(grouped).forEach(([cat,items])=>{
    const catTotal=items.reduce((s,i)=>s+i.qty*i.price,0);
    html+=`<div class="section-header"><span></span>
      <span class="section-title">${cat} <span class="section-subtotal">$${Math.round(catTotal).toLocaleString()}</span></span>
      <span></span><span></span><span></span><span></span>
      <input class="row-input" placeholder="大表備註" value="${catNotes[cat]||''}" style="width:100%;font-size:11px" onchange="catNotes['${cat}']=this.value">
      <span></span></div>`;
    items.forEach(item=>{
      const amt=item.qty*item.price;
      const hint=item.minPrice!==item.maxPrice?`<div class="price-hint">$${item.minPrice.toLocaleString()}～$${item.maxPrice.toLocaleString()}</div>`:'';
      html+=`<div class="quote-row${selectedRowIds.has(item.id)?' selected':''}" draggable="true" data-id="${item.id}" onclick="selectRow(event,${item.id})" ondragstart="qDS(event,${item.id})" ondragover="qDO(event)" ondragleave="qDL(event)" ondrop="qDP(event,${item.id})" ondragend="qDE()">
        <span class="row-num"><span class="drag-icon">⠿</span>${num++}</span>
        <div style="display:flex;flex-direction:column;gap:2px">
          <input class="row-input row-name" value="${item.name}" onchange="updateStrField(${item.id},'name',this.value)" style="width:100%;text-align:left">
          <select style="font-size:10px;padding:1px 3px;border:1px solid #e0ddd5;border-radius:3px;background:#fafaf8;color:#888;width:100%" onchange="updateItemCat(${item.id},this.value)">${buildCatOptions(item.cat)}</select>
        </div>
        <span style="text-align:right"><input class="row-input" value="${item.unit}" style="width:60px;text-align:center" onchange="updateStrField(${item.id},'unit',this.value)"></span>
        <span style="text-align:right"><input class="row-input" type="number" value="${item.qty}" onchange="updateField(${item.id},'qty',this.value)" style="width:60px"></span>
        <span style="text-align:right"><input class="row-input" type="number" value="${item.price}" onchange="updateField(${item.id},'price',this.value)" style="width:90px">${hint}</span>
        <span class="row-amount">$${Math.round(amt).toLocaleString()}</span>
        <span><input class="row-input" value="${item.note||''}" placeholder="備註" style="width:100%;font-size:11px" onchange="updateStrField(${item.id},'note',this.value)"></span>
        <button class="row-delete" onclick="removeItem(${item.id})">×</button>
      </div>`;
    });
  });
  html+=`</div>`;
  area.innerHTML=html;
  updateStats(quoteItems.length,subtotal,mgmtPct);
  document.getElementById('grandTotal').textContent='$'+Math.round(total).toLocaleString();
  document.getElementById('taxBreak').textContent=`小計 $${Math.round(beforeTax).toLocaleString()} + 營業稅 $${Math.round(tax).toLocaleString()}`;
}

function updateStats(count,subtotal,mgmtPct){
  const mgmt=subtotal*(mgmtPct/100),total=(subtotal+mgmt)*1.05;
  document.getElementById('statItems').textContent=count;
  document.getElementById('statSubtotal').textContent='$'+Math.round(subtotal).toLocaleString();

function selectRow(event,id){
  if(['INPUT','BUTTON','SELECT'].includes(event.target.tagName))return;
  if(event.metaKey||event.ctrlKey){
    selectedRowIds.has(id)?selectedRowIds.delete(id):selectedRowIds.add(id);
  } else {
    const onlyThis=selectedRowIds.size===1&&selectedRowIds.has(id);
    selectedRowIds.clear();
    if(!onlyThis)selectedRowIds.add(id);
  }
  document.querySelectorAll('.quote-row').forEach(r=>r.classList.toggle('selected',selectedRowIds.has(parseInt(r.dataset.id))));
  updateSelectionSum();
}
function updateSelectionSum(){
  const block=document.getElementById('selectionSumBlock');
  if(!block)return;
  if(!selectedRowIds.size){block.style.display='none';return;}
  const sel=quoteItems.filter(i=>selectedRowIds.has(i.id));
  const sum=sel.reduce((s,i)=>s+i.qty*i.price,0);
  document.getElementById('selectionSumAmt').textContent='$'+Math.round(sum).toLocaleString();
  document.getElementById('selectionSumCount').textContent=`已選 ${sel.length} 項`;
  block.style.display='';
}
function clearAll(){if(!quoteItems.length||confirm('確定要清除所有工項？')){saveHistory();selectedRowIds.clear();updateSelectionSum();customSectionOrder=null;quoteItems=[];miscItems=[];renderMiscItems();renderQuote();}}

function openSectionManager(){
  if(!customSectionOrder){
    const inQuote=new Set(quoteItems.map(i=>i.cat));
    customSectionOrder=[...SECTION_ORDER.filter(s=>inQuote.has(s)),...[...inQuote].filter(s=>!SECTION_ORDER.includes(s))];
  }
  renderSectionManager();
  document.getElementById('sectionMgrOverlay').style.display='flex';
}
function closeSectionManager(){
  document.getElementById('sectionMgrOverlay').style.display='none';
  renderQuote();
}
function renderSectionManager(){
  const inQuote=new Set(quoteItems.map(i=>i.cat));
  const btn=(label,onclick,disabled,color)=>`<button onclick="${onclick}" ${disabled?'disabled':''} style="padding:3px 10px;border:1px solid #e0ddd5;border-radius:4px;background:#fff;cursor:pointer;font-size:13px;color:${color||'#333'};${disabled?'opacity:0.3;cursor:default':''}">${label}</button>`;
  document.getElementById('sectionMgrList').innerHTML=(customSectionOrder||[]).map((cat,i)=>{
    const hasItems=inQuote.has(cat);
    return `<div style="display:flex;align-items:center;gap:6px;padding:7px 4px;border-bottom:0.5px solid #f0ede5">
      <span style="flex:1;font-size:13px;color:${hasItems?'#1a1a1a':'#aaa'}">${cat}${hasItems?'':' <span style="font-size:10px">（空）</span>'}</span>
      ${btn('↑',`moveSectionUp(${i})`,i===0)}
      ${btn('↓',`moveSectionDown(${i})`,i===(customSectionOrder.length-1))}
      ${!hasItems?btn('×',`removeCustomSection(${i})`,false,'#c0392b'):''}
    </div>`;
  }).join('');
}
function moveSectionUp(i){
  if(i===0)return;
  [customSectionOrder[i-1],customSectionOrder[i]]=[customSectionOrder[i],customSectionOrder[i-1]];
  renderSectionManager();
}
function moveSectionDown(i){
  if(i===customSectionOrder.length-1)return;
  [customSectionOrder[i],customSectionOrder[i+1]]=[customSectionOrder[i+1],customSectionOrder[i]];
  renderSectionManager();
}
function addCustomSection(){
  const inp=document.getElementById('sectionMgrInput');
  const name=inp.value.trim();
  if(!name)return;
  if(customSectionOrder.includes(name)){alert('已有此大項名稱');return;}
  customSectionOrder.push(name);
  inp.value='';
  renderSectionManager();
}
function removeCustomSection(i){
  customSectionOrder.splice(i,1);
  renderSectionManager();
}

function drawLogoToBase64(){
  const canvas = document.createElement('canvas');
  canvas.width = 200;
  canvas.height = 200;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,200,200);

  const cx=100, cy=105;
  ctx.strokeStyle='#2a2a2a';
  ctx.lineWidth=5;
  ctx.fillStyle='rgba(0,0,0,0)';

  // Hexagon
  ctx.beginPath();
  for(let i=0;i<6;i++){
    const angle=(Math.PI/180)*(60*i-30);
    const x=cx+78*Math.cos(angle);
    const y=cy+78*Math.sin(angle);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.stroke();

  // Roof line (house shape inside)
  ctx.beginPath();
  ctx.moveTo(38,90);
  ctx.lineTo(100,38);
  ctx.lineTo(162,90);
  ctx.stroke();

  // Chimney
  ctx.beginPath();
  ctx.moveTo(100,38);
  ctx.lineTo(100,22);
  ctx.lineWidth=7;
  ctx.stroke();
  ctx.lineWidth=5;

  // Door frame left bracket
  ctx.beginPath();
  ctx.moveTo(55,90);
  ctx.lineTo(55,155);
  ctx.moveTo(55,90);
  ctx.lineTo(62,90);
  ctx.moveTo(55,155);
  ctx.lineTo(62,155);
  ctx.stroke();

  // Door frame right bracket
  ctx.beginPath();
  ctx.moveTo(145,90);
  ctx.lineTo(145,155);
  ctx.moveTo(145,90);
  ctx.lineTo(138,90);
  ctx.moveTo(145,155);
  ctx.lineTo(138,155);
  ctx.stroke();

  // Door (open, 3D perspective)
  ctx.lineWidth=3;
  // Door back face
  ctx.beginPath();
  ctx.moveTo(80,95);
  ctx.lineTo(80,150);
  ctx.lineTo(115,150);
  ctx.lineTo(115,95);
  ctx.closePath();
  ctx.fillStyle='#555';
  ctx.fill();
  ctx.stroke();

  // Door front face (open at angle)
  ctx.beginPath();
  ctx.moveTo(80,95);
  ctx.lineTo(68,100);
  ctx.lineTo(68,153);
  ctx.lineTo(80,150);
  ctx.closePath();
  ctx.fillStyle='#888';
  ctx.fill();
  ctx.strokeStyle='#ccc';
  ctx.stroke();

  // Door knob
  ctx.strokeStyle='#2a2a2a';
  ctx.fillStyle='#ccc';
  ctx.beginPath();
  ctx.arc(110,125,4,0,Math.PI*2);
  ctx.fill();

  return canvas.toDataURL('image/png');
}

async function exportJSON(){
  if(!quoteItems.length){alert('請先加入工項再匯出');return;}
  const name=document.getElementById('projName').value||'未命名工程';
  const date=document.getElementById('projDate').value||new Date().toISOString().split('T')[0];
  const saveData=Object.assign({version:1,savedAt:new Date().toISOString()},getQuoteData());
  const json=JSON.stringify(saveData,null,2);
  const fileName=`宇德報價_${name}_${date}.json`;
  let actualFileName = fileName;
  if(window.showSaveFilePicker){
    try{
      const fh=await window.showSaveFilePicker({
        suggestedName:fileName,
        types:[{description:'JSON 報價檔',accept:{'application/json':['.json']}}]
      });
      actualFileName = fh.name; // 使用者在存檔視窗可能改過檔名，取實際名稱
      const writable=await fh.createWritable();
      await writable.write(json);
      await writable.close();
    }catch(e){if(e.name==='AbortError')return;}
  } else {
    const blob=new Blob([json],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=fileName;
    a.click();
    URL.revokeObjectURL(a.href);
  }
  // 通知同事（Firebase 即時推送）
  const _sess = JSON.parse(localStorage.getItem('yutesign_session')||'{}');
  if(_sess.email) fbSyncNotify(_sess.email, actualFileName);
}

async function importJSON(){
  let text;
  if(window.showOpenFilePicker){
    try{
      const [fh]=await window.showOpenFilePicker({
        types:[{description:'JSON 報價檔',accept:{'application/json':['.json']}}]
      });
      const file=await fh.getFile();
      text=await file.text();
    }catch(e){if(e.name==='AbortError')return; throw e;}
  }else{
    text=await new Promise((res,rej)=>{
      const input=document.createElement('input');
      input.type='file';input.accept='.json';
      input.onchange=e=>{
        const file=e.target.files[0];if(!file)return res(null);
        const reader=new FileReader();
        reader.onload=ev=>res(ev.target.result);
        reader.onerror=rej;
        reader.readAsText(file);
      };
      input.click();
    });
    if(!text)return;
  }
  try{
    const data=JSON.parse(text);
    if(!data.quoteItems){alert('檔案格式不正確');return;}
    if(!confirm('載入「'+(data.projName||'未命名工程')+'」？目前的報價內容會被取代。'))return;

    document.getElementById('mgmtFee').value=data.mgmtFee||5;
    if(document.getElementById('projEmail'))document.getElementById('projEmail').value=data.projEmail||'';
    quoteItems=(data.quoteItems||[]).map(item=>({...item,id:item.id||(Date.now()+Math.random())}));
    catNotes=data.catNotes||{};
    if(data.remarksItems)remarksItems=[...data.remarksItems];
    projDuration=data.projDuration||0;
    renderRemarks();
    miscItems=data.miscItems||[];
    renderMiscItems();
    if(data.extraCleanMode&&document.getElementById('extraCleanMode')){document.getElementById('extraCleanMode').value=data.extraCleanMode;toggleCleanMode();}
    if(data.extraCleanQty!==undefined&&document.getElementById('extraCleanQty'))document.getElementById('extraCleanQty').value=data.extraCleanQty;

    if(data.extraCleanFixed!==undefined&&document.getElementById('extraCleanFixed'))document.getElementById('extraCleanFixed').value=data.extraCleanFixed;
    if(data.extraDesignMode&&document.getElementById('extraDesignMode')){document.getElementById('extraDesignMode').value=data.extraDesignMode;toggleDesignMode();}
    if(data.extraDesignFixed!==undefined&&document.getElementById('extraDesignFixed'))document.getElementById('extraDesignFixed').value=data.extraDesignFixed;
    if(data.extraDesignPct!==undefined&&document.getElementById('extraDesignPct'))document.getElementById('extraDesignPct').value=data.extraDesignPct;
    if(data.extraDesignQty!==undefined&&document.getElementById('extraDesignQty'))document.getElementById('extraDesignQty').value=data.extraDesignQty;
    if(data.extraDesignPrice!==undefined&&document.getElementById('extraDesignPrice'))document.getElementById('extraDesignPrice').value=data.extraDesignPrice;
    if(data.extraInsurance!==undefined&&document.getElementById('extraInsurance'))document.getElementById('extraInsurance').value=data.extraInsurance;
    customSectionOrder=data.customSectionOrder||null;
    renderQuote();
  }catch(e){alert('檔案讀取失敗：'+e.message);}
}

async function driveApi(url, options={}){
  const res = await fetch(url, {
    ...options,
    headers: { 'Authorization': 'Bearer ' + driveAccessToken, ...(options.headers||{}) }
  });
  if(!res.ok){ const t=await res.text(); throw new Error(t); }
  if(res.status===204) return null;
  return res.json();
}

async function ensureDriveFolder(){
  const data = await driveApi(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(`name='${FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`)}&fields=files(id,name)`);
  if(data.files && data.files.length > 0){
    driveFolderId = data.files[0].id;
  } else {
    const res = await driveApi('https://www.googleapis.com/drive/v3/files', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ name: FOLDER_NAME, mimeType: 'application/vnd.google-apps.folder' })
    });
    driveFolderId = res.id;
  }
}


async function driveListFiles(){
  if(!driveAccessToken || !driveFolderId) return;
  const data = await driveApi(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(`'${driveFolderId}' in parents and trashed=false`)}&fields=files(id,name,modifiedTime)&orderBy=modifiedTime+desc&supportsAllDrives=true&includeItemsFromAllDrives=true`);
  const files = data.files || [];
  // 初始化資料夾最新時間戳（只在第一次設定，之後由 polling 更新）
  if(!lastFolderModifiedTime && files.length) lastFolderModifiedTime = files[0].modifiedTime;
  const container = document.getElementById('driveFiles');
  if(!files.length){ container.innerHTML = ''; return; }
  container.innerHTML = files.map(f => `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
      <span style="font-size:12px;flex:1;color:#333">${f.name}</span>

    </div>`).join('');
}

async function driveLoad(fileId){

      driveApi(`https://www.googleapis.com/drive/v3/files/${fileId}?fields=modifiedTime&supportsAllDrives=true`)
    ]);
    const data = await res.json();
    currentDriveFileId = fileId;
    lastFolderModifiedTime = meta.modifiedTime;

    catNotes = data.catNotes||{};
    if(data.remarksItems) remarksItems=[...data.remarksItems];
    projDuration=data.projDuration||0;
    renderRemarks();
    if(document.getElementById('extraCleanMode')){document.getElementById('extraCleanMode').value=data.extraCleanMode||'unit';toggleCleanMode();}

    if(document.getElementById('extraDesignFixed')) document.getElementById('extraDesignFixed').value=data.extraDesignFixed||0;
    if(document.getElementById('extraDesignPct')) document.getElementById('extraDesignPct').value=data.extraDesignPct||0;
    if(document.getElementById('extraDesignQty')) document.getElementById('extraDesignQty').value=data.extraDesignQty||0;
    if(document.getElementById('extraDesignPrice')) document.getElementById('extraDesignPrice').value=data.extraDesignPrice||0;
    if(document.getElementById('extraInsurance')) document.getElementById('extraInsurance').value=data.extraInsurance||0;

    if(d.who === fbMyEmail) return;
    if(Date.now() - d.at > 5 * 60 * 1000) return; // 超過 5 分鐘的舊通知不顯示
    const who = d.who.replace('@yutesign.com', '');
    showSyncBanner(`${who} 剛存了「${d.fileName}」`);
  });
}

// ===== 登入驗證 =====
const ALLOWED_DOMAIN = 'yutesign.com';
const SESSION_HOURS = 8; // 重開頁面幾小時內免重新登入
let loginTokenClient;

function startLogin(){
  if(!loginTokenClient){ alert('Google 模組尚未載入，請稍候再試'); return; }
  document.getElementById('btnLogin').textContent = '登入中...';
  document.getElementById('btnLogin').disabled = true;
  loginTokenClient.requestAccessToken({prompt: 'select_account'});
}

function initLoginGsi(){
  loginTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/userinfo.email ' + SCOPES,
    callback: async (resp) => {
      if(resp.error){
        document.getElementById('btnLogin').textContent = '使用公司帳號登入';
        document.getElementById('btnLogin').disabled = false;
        showLoginError('授權失敗，請再試一次');
        return;
      }
      // 取得使用者email
      try {
        const res = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
          headers: {'Authorization': 'Bearer ' + resp.access_token}
        });
        const user = await res.json();
        if(!user.email || !user.email.endsWith('@' + ALLOWED_DOMAIN)){
          showLoginError('此帳號無使用權限，請使用 @yutesign.com 帳號');
          document.getElementById('btnLogin').textContent = '使用公司帳號登入';
          document.getElementById('btnLogin').disabled = false;
          google.accounts.oauth2.revoke(resp.access_token);
          return;
        }
        // 驗證通過，進入系統
        driveAccessToken = resp.access_token;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = '';
        localStorage.setItem('yutesign_session', JSON.stringify({email: user.email, loginTime: Date.now()}));
        await driveListFiles();
        fbSyncListen(user.email);
      } catch(e){
        showLoginError('驗證失敗：' + e.message);
        document.getElementById('btnLogin').textContent = '使用公司帳號登入';
        document.getElementById('btnLogin').disabled = false;
      }
    }
  });
}

function showLoginError(msg){
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.style.display = '';
}

// 覆寫loadGsi，同時初始化登入用tokenClient
function loadGsi(){
  const s = document.createElement('script');
  s.src = 'https://accounts.google.com/gsi/client';
  s.onload = () => {
    initGsi();
    initLoginGsi();
  };
  document.head.appendChild(s);
}
</script>

<script>
document.addEventListener('keydown',e=>{

  if(tag==='INPUT'||tag==='TEXTAREA')return;
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();undo();}
  else if((e.ctrlKey||e.metaKey)&&((e.key==='z'&&e.shiftKey)||e.key==='y')){e.preventDefault();redo();}
});

// 左右面板拖曳調整寬度
(function(){
  const resizer=document.getElementById('panelResizer');
  const leftPanel=document.querySelector('.panel-left');
  if(!resizer||!leftPanel)return;
  let startX,startW;
  resizer.addEventListener('mousedown',e=>{
    startX=e.clientX;
    startW=leftPanel.offsetWidth;
    resizer.classList.add('dragging');
    document.body.style.cursor='col-resize';
    document.body.style.userSelect='none';
    function onMove(e){
      const w=Math.max(200,Math.min(600,startW+(e.clientX-startX)));
      leftPanel.style.width=w+'px';
    }
    function onUp(){
      resizer.classList.remove('dragging');
      document.body.style.cursor='';
      document.body.style.userSelect='';
      document.removeEventListener('mousemove',onMove);
      document.removeEventListener('mouseup',onUp);
    }
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
    e.preventDefault();
  });
})();
</script>
